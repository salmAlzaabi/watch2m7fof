<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>نظام MDT - شرطة</title>
    <link rel="stylesheet" href="style.css" />
    <!-- Font Awesome للأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
</head>
<body>

    <!-- الشريط العلوي -->
    <header class="navbar">
        <div class="logo">
            <i class="fas fa-shield-alt"></i>
            <span>MDT | شرطة</span>
        </div>
        <div class="badge">
            <i class="fas fa-circle" style="color: #00ff88;"></i>
            <span>تم الاتصال</span>
        </div>
    </header>

    <!-- المحتوى الرئيسي -->
    <main class="container">

        <!-- بطاقات الإحصائيات -->
        <section class="stats">
            <div class="stat-card">
                <i class="fas fa-users"></i>
                <div>
                    <h3>الضباط</h3>
                    <p id="officerCount">0</p>
                </div>
            </div>
            <div class="stat-card">
                <i class="fas fa-exclamation-triangle"></i>
                <div>
                    <h3>البلاغات النشطة</h3>
                    <p id="reportCount">0</p>
                </div>
            </div>
            <div class="stat-card">
                <i class="fas fa-handcuffs"></i>
                <div>
                    <h3>أوامر قبض</h3>
                    <p id="warrantCount">0</p>
                </div>
            </div>
        </section>

        <!-- أزرار الإجراءات السريعة -->
        <div class="actions">
            <button id="addReportBtn" class="btn primary"><i class="fas fa-plus"></i> بلاغ جديد</button>
            <button id="addWarrantBtn" class="btn warning"><i class="fas fa-gavel"></i> أمر قبض</button>
            <button id="searchBtn" class="btn info"><i class="fas fa-search"></i> بحث</button>
        </div>

        <!-- البحث -->
        <section class="search-section" id="searchSection" style="display:none;">
            <input type="text" id="searchInput" placeholder="ابحث عن مواطن أو مركبة..." />
            <button id="searchExecBtn"><i class="fas fa-search"></i></button>
            <div id="searchResult"></div>
        </section>

        <!-- جدول البلاغات -->
        <section class="table-section">
            <h2><i class="fas fa-list"></i> البلاغات</h2>
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>النوع</th>
                        <th>الموقع</th>
                        <th>الحالة</th>
                        <th>الوقت</th>
                        <th>إجراء</th>
                    </tr>
                </thead>
                <tbody id="reportsTableBody">
                    <!-- تملأ بواسطة JavaScript -->
                </tbody>
            </table>
        </section>

        <!-- جدول أوامر القبض -->
        <section class="table-section">
            <h2><i class="fas fa-gavel"></i> أوامر القبض</h2>
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>المطلوب</th>
                        <th>التهمة</th>
                        <th>الحالة</th>
                        <th>إجراء</th>
                    </tr>
                </thead>
                <tbody id="warrantsTableBody">
                    <!-- تملأ بواسطة JavaScript -->
                </tbody>
            </table>
        </section>

    </main>

    <!-- مودال إضافة بلاغ -->
    <div id="reportModal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeReportModal">&times;</span>
            <h2>بلاغ جديد</h2>
            <form id="reportForm">
                <label>نوع البلاغ</label>
                <select id="reportType" required>
                    <option value="سرقة">سرقة</option>
                    <option value="شغب">شغب</option>
                    <option value="حريق">حريق</option>
                    <option value="حوادث سير">حوادث سير</option>
                    <option value="أخرى">أخرى</option>
                </select>
                <label>الموقع</label>
                <input type="text" id="reportLocation" placeholder="مثال: شارع السلام" required />
                <label>تفاصيل</label>
                <textarea id="reportDetails" placeholder="تفاصيل البلاغ..."></textarea>
                <button type="submit" class="btn primary">إرسال البلاغ</button>
            </form>
        </div>
    </div>

    <!-- مودال إضافة أمر قبض -->
    <div id="warrantModal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeWarrantModal">&times;</span>
            <h2>أمر قبض جديد</h2>
            <form id="warrantForm">
                <label>اسم المطلوب</label>
                <input type="text" id="warrantName" placeholder="الاسم الكامل" required />
                <label>التهمة</label>
                <input type="text" id="warrantCharge" placeholder="مثال: سطو مسلح" required />
                <button type="submit" class="btn warning">إصدار أمر قبض</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
